name: PR Guardrails

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    # Hard gate: the app must compile, or it could break the site.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
